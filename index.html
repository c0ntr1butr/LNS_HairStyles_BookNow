<script>
  const SHOP_NAME = "LNS HairStyles";
  const OWNER_PHONE = "919701326265";
  const CO_OWNER_PHONE = "918374794192";

  const GOOGLE_SCRIPT_URL = "";

  const form = document.getElementById("bookingForm");
  const submitBtn = document.getElementById("submitBtn");
  const successBox = document.getElementById("successBox");
  const errorBox = document.getElementById("errorBox");
  const ownerWhatsappLink = document.getElementById("ownerWhatsappLink");
  const coOwnerWhatsappLink = document.getElementById("coOwnerWhatsappLink");

  function isWithinBusinessTime(time) {
    const openingTime = "05:30";
    const closingTime = "21:00";

    return time >= openingTime && time <= closingTime;
  }

  form.addEventListener("submit", async function (e) {
    e.preventDefault();

    successBox.style.display = "none";
    errorBox.style.display = "none";
    ownerWhatsappLink.style.display = "none";
    coOwnerWhatsappLink.style.display = "none";

    const selectedTime = document.getElementById("time").value;

    if (!isWithinBusinessTime(selectedTime)) {
      alert("Service unavailable. Please book between 5:30 AM and 9:00 PM.");
      errorBox.innerText = "Service unavailable. Please choose a time between 5:30 AM and 9:00 PM.";
      errorBox.style.display = "block";
      return;
    }

    submitBtn.disabled = true;
    submitBtn.innerText = "Booking...";

    const booking = {
      shopName: SHOP_NAME,
      name: document.getElementById("name").value.trim(),
      phone: document.getElementById("phone").value.trim(),
      service: document.getElementById("service").value,
      date: document.getElementById("date").value,
      time: selectedTime,
      message: document.getElementById("message").value.trim(),
      createdAt: new Date().toLocaleString()
    };

    const whatsappMessage =
`New Appointment Request - ${SHOP_NAME}

Name: ${booking.name}
Phone: ${booking.phone}
Service: ${booking.service}
Date: ${booking.date}
Time: ${booking.time}
Message: ${booking.message || "No special request"}

Please confirm the slot.
If not available, please reply with an updated time.`;

    const encodedMessage = encodeURIComponent(whatsappMessage);

    ownerWhatsappLink.href = `https://wa.me/${OWNER_PHONE}?text=${encodedMessage}`;
    coOwnerWhatsappLink.href = `https://wa.me/${CO_OWNER_PHONE}?text=${encodedMessage}`;

    try {
      if (GOOGLE_SCRIPT_URL) {
        await fetch(GOOGLE_SCRIPT_URL, {
          method: "POST",
          mode: "no-cors",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(booking)
        });
      }

      successBox.innerText =
        "Your appointment details are ready. WhatsApp will open now for the owner. After sending, please also tap the co-owner button for quick confirmation.";

      successBox.style.display = "block";
      ownerWhatsappLink.style.display = "block";
      coOwnerWhatsappLink.style.display = "block";

      setTimeout(() => {
        window.open(ownerWhatsappLink.href, "_blank");
      }, 800);

      form.reset();
    } catch (error) {
      console.error(error);

      errorBox.innerText =
        "Something went wrong. Please use the WhatsApp buttons to send booking manually.";

      errorBox.style.display = "block";
      ownerWhatsappLink.style.display = "block";
      coOwnerWhatsappLink.style.display = "block";
    }

    submitBtn.disabled = false;
    submitBtn.innerText = "Book Appointment";
  });
</script>
